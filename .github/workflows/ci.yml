name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    name: node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm install

      - name: Typecheck (mddocs-local)
        run: npm run typecheck -w mddocs-local

      - name: Typecheck (mddocs-cli)
        run: npm run typecheck -w mddocs-cli

      - name: Test (mddocs-local)
        run: npm test -w mddocs-local

      - name: Test (mddocs-cli)
        run: npm test -w mddocs-cli
